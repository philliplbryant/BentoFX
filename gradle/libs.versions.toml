[versions]
# Libraries
assertj = "3.27.7"
dependency-analysis-gradle-plugin = "3.9.0"
jackson = "2.21.1"
javafx = "23.0.2"
jaxb = "4.0.6"
jspecify = "1.0.0"
junit = "6.0.3"
testfx = "4.0.18"
testfx-monocle = "21.0.2"

# Plugins
benmanes-versions = "0.52.0"
buildconfig = "6.0.9"
javafx-plugin = "0.1.0"
jreleaser = "1.23.0"

[libraries]
assertj = { module = "org.assertj:assertj-core", version.ref = "assertj" }
benmanes-versions-gradlePlugin-dependency = { module = "com.github.ben-manes:gradle-versions-plugin", version.ref = "benmanes-versions" }
dependencyAnalysis-gradlePlugin-dependency = { module = "com.autonomousapps.dependency-analysis:com.autonomousapps.dependency-analysis.gradle.plugin", version.ref = "dependency-analysis-gradle-plugin" }
jackson-bom = { module = "com.fasterxml.jackson:jackson-bom", version.ref = "jackson" }
javafx-base = { module = "org.openjfx:javafx-base", version.ref = "javafx" }
javafx-controls = { module = "org.openjfx:javafx-controls", version.ref = "javafx" }
javafx-gradlePlugin-dependency = { module = "org.openjfx.javafxplugin:org.openjfx.javafxplugin.gradle.plugin", version.ref = "javafx-plugin" }
javafx-graphics = { module = "org.openjfx:javafx-graphics", version.ref = "javafx" }
jaxb-bom = { module = "org.glassfish.jaxb:jaxb-bom", version.ref = "jaxb" }
jreleaser-gradlePlugin-dependency = { module = "org.jreleaser:org.jreleaser.gradle.plugin", version.ref = "jreleaser" }
jspecify = { module = "org.jspecify:jspecify", version.ref = "jspecify" }
junit-api = { module = "org.junit.jupiter:junit-jupiter-api" }
junit-bom = { module = "org.junit:junit-bom", version.ref = "junit" }
junit-engine = { module = "org.junit.jupiter:junit-jupiter-engine" }
junit-launcher = { module = "org.junit.platform:junit-platform-launcher" }
junit-params = { module = "org.junit.jupiter:junit-jupiter-params" }
testfx = { module = "org.testfx:testfx-junit5", version.ref = "testfx" }
testfx-core = { module = "org.testfx:testfx-core", version.ref = "testfx" }
testfx-monocle = { module = "org.testfx:openjfx-monocle", version.ref = "testfx-monocle" }

[bundles]
annotations = ["jspecify"]
javafx = [ "javafx-base", "javafx-controls", "javafx-graphics", ]
test-libraries = ["assertj", "junit-api",  "junit-params", "testfx", "testfx-core","testfx-monocle"]
test-runtime = ["junit-engine", "junit-launcher"]

[plugins]
benmanes-versions = { id = "com.github.ben-manes.versions", version.ref = "benmanes-versions" }
buildconfig = { id = "com.github.gmazzo.buildconfig", version.ref = "buildconfig" }
dependencyAnalysis-gradlePlugin = { id = "com.autonomousapps.dependency-analysis", version.ref = "dependency-analysis-gradle-plugin" }
jreleaser = { id = "org.jreleaser", version.ref = "jreleaser" }
